packages:
  - packages/*
allowBuilds:
  '@parcel/watcher': true
  electron: true
  electron-winstaller: false
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: false
  unrs-resolver: true
blockExoticSubdeps: false
catalog:
  '@app/electron-versions': workspace:*
  '@app/main': workspace:*
  '@app/preload': workspace:*
  '@app/renderer': workspace:*
  typescript: ^5.9.3
  vite: ^8.0.14
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - core-js
  - cpu-features
  - electron
  - esbuild
  - lmdb
  - msgpackr-extract
