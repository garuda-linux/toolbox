<ng-container *transloco="let t">
  <div class="surface-section px-4 text-center md:px-6 lg:px-8">
    <div class="text-3xl font-bold">
      <span class="text-color">{{ t('diagnostics.title') }} </span>
      <span class="text-primary">{{ t('diagnostics.titleTwo') }}</span>
    </div>
  </div>

  <div class="p-10">
    <p-card>
      <div class="flex flex-wrap justify-center gap-4 mb-8">
        @for (tool of diagnosticTools; track tool.id) {
          <p-button
            [label]="t(tool.label)"
            [icon]="tool.icon"
            [pTooltip]="t(tool.description)"
            tooltipPosition="bottom"
            [outlined]="true"
            (click)="
              tool.id === 'full' ? getFullLogs() : tool.id === 'upload' ? uploadPrivateBin() : getOutput(tool.id)
            "
          />
        }
      </div>

      <div class="border-t border-surface-700">
        <div class="h-[70vh]">
          <ng-terminal #term [xtermOptions]="xtermOptions()" />
        </div>
      </div>
    </p-card>
  </div>
</ng-container>
