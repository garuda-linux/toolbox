<ng-container *transloco="let t">
  <div class="background-filter">
    <div class="background non-blurred">
      <garuda-shell id="shellBar" [menuItems]="menubarModel()">
        <div garudaShellBarEnd>
          @if (loadingService.loading()) {
            <p-progress-spinner
              [style]="{
                'width': '1.5rem',
                'height': '1.5rem',
                'vertical-align': 'middle',
                'margin-right': '1rem',
              }"
              strokeWidth="10"
              ariaLabel="loading"
            />
          }

          <p-auto-complete
            [(ngModel)]="selectedModule"
            [ngClass]="{
              'ng-dirty ng-invalid': selectedModule() !== '' && moduleSuggestions().length === 0,
            }"
            [placeholder]="t('menu.modules.search')"
            [forceSelection]="true"
            [suggestions]="moduleSuggestions()"
            (completeMethod)="filterModuleSuggestions($event)"
            (onSelect)="selectModule($event)"
            garudaShellBarEnd
            size="small"
            optionLabel="moduleName"
          >
            <ng-template #item let-module>
              <div class="flex items-center gap-2">
                <div>{{ t(module.moduleName) }}</div>
              </div>
            </ng-template>
          </p-auto-complete>

          @if (taskManager.count() > 0) {
            <p-splitbutton
              class="garuda-button-shine ml-2 animate-shine"
              [model]="applyMenuItems"
              (onClick)="taskManager.toggleTerminal(true)"
              garudaShellBarEnd
              severity="secondary"
              size="small"
            >
              <ng-template #content>
                {{ t('menu.pending') }}
              </ng-template>
            </p-splitbutton>
          }
        </div>
        <div class="mt-5 route-container">
          <router-outlet />
        </div>
        <p-scroll-top />
      </garuda-shell>
    </div>

    <p-menu
      #dropdownMenu
      [model]="dropdownModel()"
      [class.garuda-shell__dropdown--visible]="dropdownVisible()"
      [style.display]="dropdownVisible() ? 'block' : 'none'"
      [style.top.px]="dropdownTop()"
      [style.left.px]="dropdownLeft()"
      class="garuda-shell__dropdown"
      (click)="dropdownVisible.set(false)"
    />

    <p-confirm-dialog />
    <p-context-menu [model]="rightClickMenu()" [global]="true" />

    <toolbox-designer />
    <toolbox-terminal #terminalComponent />
    <toolbox-operation-manager #operationManagerComponent />
    <toolbox-command-palette />
  </div>
</ng-container>
